<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture & Pose™ Registration</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> 
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        // =============================================
        // EMAILJS CONFIG — Fill in your credentials
        // =============================================
        (function(){
            emailjs.init("XfV62oYNl_QAwWLuW"); // 🔑 Replace with your EmailJS Public Key
        })();
    </script>
</head>
<body>
    <!-- Netlify bot detection hidden form -->
    <form name="capture_pose_reg" netlify hidden>
        <input type="text" name="full_name">
        <input type="email" name="email">
        <input type="tel" name="phone">
        <textarea name="questions"></textarea>
    </form>

    <header>
        <nav>
            <div class="container">
                <div class="logo">
                    <img src="img/logo.svg" alt="Art2Digi Solutions Logo" class="logo-img">
                    Art2Digi Solutions
                </div>
                <ul>
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#workshops">Workshops</a></li> 
                    <li><a href="index.html#services">Services</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>
    
    <main> 
        <section class="registration-page">
            <div class="container">
                <h2>Capture & Pose™ Workshop Registration</h2>
                <p class="form-intro">Secure your spot for the Mobile Photography & Natural Posing workshop!</p>

                <div class="workshop-reg-details" id="workshopDetails">
                    <!-- Loaded from workshops.json -->
                </div>

                <p class="investment-note" id="paymentNote">
                    <!-- Loaded from workshops.json -->
                </p>

                <!-- 
                    NETLIFY FIX: action attribute on the form tag is what controls the redirect.
                    Do NOT use <input type="hidden" name="next"> — that does not work reliably.
                -->
                <form 
                    id="registrationForm"
                    name="capture_pose_reg" 
                    method="POST" 
                    data-netlify="true"
                    data-netlify-success="/thank-you-capture-pose.html"
                    netlify-honeypot="bot-field"
                    action="/thank-you-capture-pose.html"
                >
                    <input type="hidden" name="bot-field" />
                    <input type="hidden" name="form-name" value="capture_pose_reg">
                    
                    <label for="full_name">Full Name *</label>
                    <input type="text" id="full_name" name="full_name" required placeholder="Your full name">

                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">

                    <label for="phone">Phone Number (WhatsApp preferred)</label>
                    <input type="tel" id="phone" name="phone" placeholder="+297 XXX XXXX">

                    <label for="questions">Questions for the instructor?</label>
                    <textarea id="questions" name="questions" placeholder="Any questions or special requests..."></textarea>

                    <button type="submit" class="btn register-btn" id="submitBtn">
                        <i class="fas fa-camera"></i> Secure My Spot
                    </button>
                </form>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 Art2Digi Solutions. All rights reserved.</p>
            <p>Lens Method™ is a trademark of Art2Digi Solutions.</p>
        </div>
    </footer>

    <script>
        // =============================================
        // EMAILJS CREDENTIALS — Fill in your own
        // =============================================
        const EMAILJS_SERVICE_ID  = "service_4ewil9m";   // 🔑 e.g. "service_abc123"
        const EMAILJS_TEMPLATE_ID = "template_ngxt1ck";  // 🔑 e.g. "template_xyz789"

        // =============================================
        // LOAD WORKSHOP DATA FROM JSON
        // =============================================
        let workshopData = null;

        async function loadWorkshopData() {
            try {
                const response = await fetch('workshops.json?v=' + Date.now());
                const data = await response.json();
                workshopData = data['capture-pose'];
                workshopData.bank = data.bank; // use shared bank details
                renderPageDetails(workshopData);
            } catch (error) {
                console.error('Could not load workshops.json:', error);
            }
        }

        function renderPageDetails(w) {
            // Populate workshop details block
            document.getElementById('workshopDetails').innerHTML = `
                <p><i class="fas fa-calendar"></i> <strong>${w.date}</strong> &nbsp;|&nbsp; <i class="fas fa-clock"></i> ${w.time}</p>
                <p><i class="fas fa-map-marker-alt"></i> ${w.location}</p>
                <p><i class="fas fa-tag"></i> ${w.price_earlybird ? `Early Bird <strong>${w.currency} ${w.price_earlybird}</strong> (${w.earlybird_label}) &nbsp;|&nbsp; Regular <strong>${w.currency} ${w.price_regular}</strong>` : `<strong>${w.currency} ${w.price_regular}</strong>`}</p>
            `;

            // Populate payment note
            document.getElementById('paymentNote').innerHTML = `
                ⚡ Payment required within <strong>${w.payment_deadline_hours} hours</strong> to confirm your spot. 
                Payment instructions will be sent to your email immediately after registration.
            `;
        }

        // =============================================
        // FORM SUBMIT
        // We handle everything manually:
        // 1. Submit to Netlify via fetch
        // 2. Send EmailJS confirmation
        // 3. Redirect to custom thank-you page
        // =============================================
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Stop default form submit — we handle it ourselves

            if (!workshopData) return;

            const btn   = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;

            const name  = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const questions = document.getElementById('questions').value;
            const w = workshopData;

            // Step 1 — Submit to Netlify via fetch
            try {
                const formData = new FormData();
                formData.append('form-name', 'capture_pose_reg');
                formData.append('full_name', name);
                formData.append('email', email);
                formData.append('phone', phone);
                formData.append('questions', questions);

                await fetch('/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(formData).toString()
                });

                console.log('Netlify submission successful');
            } catch (err) {
                console.error('Netlify submission error:', err);
            }

            // Step 2 — Send EmailJS confirmation email
            try {
                const templateParams = {
                    to_name:      name,
                    to_email:     email,
                    workshop:     w.fullName,
                    date:         w.date,
                    time:         w.time,
                    location:     w.location,
                    price_note:   w.price_earlybird ? `Early Bird ${w.currency} ${w.price_earlybird} (${w.earlybird_label}) | Regular ${w.currency} ${w.price_regular}` : `${w.currency} ${w.price_regular}`,
                    bank_name:    w.bank.name,
                    bank_account: w.bank.account,
                    bank_holder:  w.bank.holder,
                    deadline:     `${w.payment_deadline_hours} hours`
                };

                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                console.log('Confirmation email sent');
            } catch (err) {
                console.error('EmailJS error:', err);
                // Don't block redirect if email fails
            }

            // Step 3 — Redirect to custom thank-you page
            window.location.href = '/thank-you-capture-pose.html';
        });

        document.addEventListener('DOMContentLoaded', loadWorkshopData);
    </script>
</body>
</html>
